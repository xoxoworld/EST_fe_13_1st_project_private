<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1차 프로젝트 8조</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/flex-utility.css" />
  </head>

  <body>
    <h1>공통 요소</h1>
    <h2>제목위계</h2>
    <!--제목 (Do Hyeon)-->
    <h1 class="title-xl">title-xl</h1>
    <h2 class="title-l">title-l</h2>

    <!--부제목 (Google Sans Flex)-->
    <h3 class="subtitle-regular">subtitle-regular</h3>
    <h3 class="subtitle-bold">subtitle-bold</h3>

    <!--본문 (Google Sans Flex)-->
    <p class="body-large-30">body-large-30</p>
    <p class="body-large-medium">body-large-medium</p>
    <p class="body-large-up">body-large-up</p>
    <p class="body-large-bold">body-large-bold</p>
    <p class="body-normal-medium">body-normal-medium</p>
    <p class="body-normal-regular">body-normal-regular</p>
    <p class="body-small-12">body-small-12</p>
    <p class="caption-light">caption-light</p>

    <!--flex utility-->
    <h3>flex utility</h3>
    <div class="d-flex">
      <div>content</div>
      <div>content</div>
    </div>
    <div class="d-flex flex-column">
      <div>content</div>
      <div>content</div>
    </div>
    <div class="d-flex justify-content-center">
      <div>content</div>
      <div>content</div>
    </div>
    <div class="d-flex justify-content-between">
      <div>content</div>
      <div>content</div>
    </div>
    <div class="d-flex align-items-center">
      <div>content</div>
      <div>content</div>
    </div>
  </body>
</html>
